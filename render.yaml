services:
  - type: web
    name: tapsocials
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/storage
      # Set these in the Render dashboard after Cloudflare resources are created.
      - key: EDGE_SYNC_SECRET
        sync: false
      - key: EDGE_WORKER_SYNC_URL
        value: https://tapsocials.com/__edge
      # Password reset email (Resend). Paste RESEND_API_KEY in the Render dashboard.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: TapSocials <noreply@tapsocials.com>
      - key: APP_BASE_URL
        value: https://tapsocials.com
    disk:
      name: tapsocials-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
